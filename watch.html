<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workshop Archives | Masqueraide Workshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #09090b; 
            color: #fafafa;
            font-family: ui-sans-serif, system-ui, sans-serif;
        }
        
        /* The clean, dark-mode card style from the early builds */
        .video-entry {
            background: #121214;
            border: 1px solid #1c1c1f;
            transition: all 0.2s ease-in-out;
        }

        .video-entry:hover {
            border-color: #3f3f46;
            background: #18181b;
        }

        .category-tag {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #ef4444; /* Masqueraide Red */
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-10 border-b border-zinc-800 pb-6">
            <h1 class="text-2xl font-black tracking-tight uppercase italic">Workshop Archives</h1>
            <a href="index.html" class="text-xs font-bold text-zinc-500 hover:text-white transition uppercase tracking-widest">
                Close & Return
            </a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="video-entry rounded-lg overflow-hidden">
                <div class="aspect-video bg-black">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/VIDEO_ID_1" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="p-4">
                    <span class="category-tag">Technical Tutorial</span>
                    <h2 class="text-base font-bold mt-1 text-zinc-100">Silicone Basics: Part 1</h2>
                </div>
            </div>

            <div class="video-entry rounded-lg overflow-hidden">
                <div class="aspect-video bg-black">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/VIDEO_ID_2" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="p-4">
                    <span class="category-tag">Artistry</span>
                    <h2 class="text-base font-bold mt-1 text-zinc-100">Fine Detail Airbrushing</h2>
                </div>
            </div>

            <div class="video-entry rounded-lg overflow-hidden">
                <div class="aspect-video bg-black">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/VIDEO_ID_3" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="p-4">
                    <span class="category-tag">Studio Life</span>
                    <h2 class="text-base font-bold mt-1 text-zinc-100">Workshop Setup & Safety</h2>
                </div>
            </div>

        </div>

        <div class="mt-16 flex justify-center border-t border-zinc-800 pt-10">
            <nav class="flex gap-2">
                <button class="px-4 py-2 bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs font-bold uppercase rounded">Prev</button>
                <button class="px-4 py-2 bg-zinc-800 border border-zinc-700 text-white text-xs font-bold uppercase rounded">Next Page</button>
            </nav>
        </div>
    </div>

</body>
</html>
