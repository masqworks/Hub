<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Box Office | Masqworks Drive-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 177.7vw;
            max-width: 450px;
            max-height: 800px;
            background-image: url('drive_in_entrance_bg_v2.png'); 
            background-size: 100% 100%;
        }

        .bento-menu {
            position: absolute;
            top: 25%;
            left: 52%;
            width: 43%;
            min-height: 100px; 
            max-height: 40%; 
            background: rgba(0, 0, 0, 0.9); /* Darker for better text pop */
            backdrop-filter: blur(10px); 
            border: 2px solid #FFFFFF; /* Crisp White Border */
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            z-index: 20;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .bento-header {
            color: #ef4444; /* Keep the red for the branding */
            font-size: 11px;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .movie-link {
            color: #FFFFFF; /* Full Bright White */
            font-size: 10px;
            font-weight: bold;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
            line-height: 1.3;
            text-transform: uppercase;
            display: block;
        }

        .movie-link:hover {
            background: #FFFFFF;
            color: #000;
            transform: scale(1.02);
        }

        .back-btn {
            position: absolute;
            top: 4%;
            left: 5%;
            color: #FFFFFF; /* Full Bright White */
            text-decoration: none;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 30;
            padding: 8px 12px;
            background: rgba(0,0,0,0.5);
            border-left: 3px solid #ef4444;
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            background: #ef4444;
            color: #fff;
        }

        .bento-menu::-webkit-scrollbar { width: 4px; }
        .bento-menu::-webkit-scrollbar-thumb { background: #666; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="stage">
        <a href="index.html" class="back-btn">RETURN TO HUB</a>

        <div class="bento-menu">
            <div class="bento-header">NOW SHOWING</div>
            
            <a href="theater.html?vid=cE0lxvVm7AE" class="movie-link">
                MASQUERAIDE PODCAST: EP 1
            </a>

            <a href="theater.html?vid=p8u_k2LIZ_0" class="movie-link">
                CRYPT TV: THE LOOK-SEE
            </a>
            
            <a href="theater.html?vid=j76uI7G8fXo" class="movie-link">
                CRYPT TV: BIRCH
            </a>
        </div>
    </div>

</body>
</html>
