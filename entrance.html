<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Box Office | Masqworks Drive-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 177.7vw;
            max-width: 450px;
            max-height: 800px;
            background-image: url('drive_in_entrance_bg_v2.png'); 
            background-size: 100% 100%;
        }

        /* The Expandable Bento Box - Now with deeper glass effect */
        .bento-menu {
            position: absolute;
            top: 25%;
            left: 52%;
            width: 43%;
            min-height: 100px; 
            max-height: 40%; 
            background: rgba(10, 10, 12, 0.85); 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .bento-header {
            color: #ef4444; 
            font-size: 10px;
            font-weight: 900;
            text-align: center;
            border-bottom: 1px solid #333;
            padding-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .movie-link {
            color: #e4e4e7;
            font-size: 9px;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            line-height: 1.3;
            text-transform: uppercase;
            display: block;
        }

        .movie-link:hover {
            background: rgba(220, 38, 38, 0.2);
            border-color: #ef4444;
            color: #fff;
            transform: scale(1.02);
        }

        /* Moved to the top left sky area for high visibility */
        .back-btn {
            position: absolute;
            top: 4%;
            left: 5%;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 30;
            padding: 8px;
            border-left: 2px solid #ef4444;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: #fff;
        }

        /* Custom scrollbar for the menu */
        .bento-menu::-webkit-scrollbar {
            width: 4px;
        }
        .bento-menu::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="stage">
        <a href="index.html" class="back-btn">RETURN TO HUB</a>

        <div class="bento-menu">
            <div class="bento-header">NOW SHOWING</div>
            
            <a href="theater.html?vid=cE0lxvVm7AE" class="movie-link">
                MASQUERAIDE PODCAST: EP 1
            </a>

            <a href="theater.html?vid=p8u_k2LIZ_0" class="movie-link">
                CRYPT TV: THE LOOK-SEE
            </a>
            
            <a href="theater.html?vid=j76uI7G8fXo" class="movie-link">
                CRYPT TV: BIRCH
            </a>

            </div>
    </div>

</body>
</html>
