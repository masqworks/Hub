<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Box Office | Masqworks Drive-In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        .stage {
            position: relative;
            width: 100vw;
            height: 177.7vw;
            max-width: 450px;
            max-height: 800px;
            background-image: url('drive_in_entrance_bg_v2.png'); 
            background-size: 100% 100%;
        }

        .bento-menu {
            position: absolute;
            top: 25%;
            left: 45%; 
            width: 50%; 
            max-height: 48%; 
            background: rgba(0, 0, 0, 0.94); 
            backdrop-filter: blur(12px); 
            border: 2px solid #FFFFFF; 
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            z-index: 20;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
        }

        .bento-header {
            color: #ef4444; 
            font-size: 18px; 
            font-weight: 900;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 4px; 
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); 
        }

        .movie-link {
            color: #FFFFFF; 
            font-size: 10px; 
            font-weight: bold;
            text-decoration: none;
            padding: 12px 8px; 
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s ease;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            white-space: normal; 
            word-wrap: break-word;
            line-height: 1.4;
        }

        .movie-link:hover {
            background: #FFFFFF;
            color: #000;
        }

        .back-btn {
            position: absolute;
            top: 4%;
            left: 5%;
            color: #FFFFFF; 
            text-decoration: none;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            z-index: 30;
            padding: 8px 14px;
            background: rgba(0,0,0,0.7);
            border-left: 4px solid #ef4444;
            backdrop-filter: blur(5px);
        }

        .bento-menu::-webkit-scrollbar { width: 4px; }
        .bento-menu::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="stage">
        <a href="index.html" class="back-btn">RETURN TO HUB</a>

        <div class="bento-menu">
            <div class="bento-header">NOW SHOWING</div>
            
            <a href="theater.html?vid=cE0lxvVm7AE" class="movie-link">
                MASQUERAIDE WORKSHOP - PODCAST
            </a>
            
            <a href="theater.html?vid=9a2FmgKNOTM" class="movie-link">
                CRYPT TV: GRIMA
            </a>
            
            <a href="theater.html?vid=xvgqhn-G-Es" class="movie-link">
                CRYPT TV: LaVey
            </a>
            
            <a href="theater.html?vid=k2zxVAHU5C0" class="movie-link">
                KINGS OF HORROR: WHITE RAVEN
            </a>
        </div>
    </div>

</body>
</html>
