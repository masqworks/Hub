<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masqworks Theater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 1. The Container: This holds your image as a background */
        .theater-box {
            position: relative;
            width: 100%;
            max-width: 450px; 
            aspect-ratio: 9/16;
            background-image: url('drive_in_screen.png');
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        /* 2. The Video: Positioned precisely over the hole in the image */
        .video-overlay {
            position: absolute;
            /* These coordinates match your frame location */
            top: 11.2%;    
            left: 9.5%;    
            width: 81%;    
            height: 18.3%; 
            background: #000;
        }

        .video-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .exit-btn {
            position: absolute;
            bottom: 5%;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #444;
            color: #999;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="theater-box">
        <div class="video-overlay">
            <iframe 
                src="https://www.youtube.com/embed/cE0lxvVm7AE?modestbranding=1&rel=0" 
                allowfullscreen>
            </iframe>
        </div>

        <a href="index.html" class="exit-btn">Return to Hub</a>
    </div>

</body>
</html>
