<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masqworks Drive-In | Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #09090b; 
            color: #fafafa;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .theater-stage {
            position: relative;
            width: 100%;
            max-width: 500px; /* Limits width on desktop so it stays vertical */
            aspect-ratio: 9/16; /* Changed to match your new tall image */
            margin: 0 auto;
        }

        /* Video positioning for the new taller layout */
        .video-wrapper {
            position: absolute;
            top: 10.5%;    
            left: 10%;     
            width: 80%;    
            height: 18%;   /* YouTube is 16:9, so it only needs a small slice of the tall image */
            z-index: 10;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .screen-structure {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 20;
            background-image: url('drive_in_screen.png'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .exit-link {
            margin: 20px 0 40px 0;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 10px;
            font-weight: 900;
            color: #52525b;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #27272a;
            padding: 12px 24px;
            border-radius: 6px;
            background: rgba(18, 18, 18, 0.5);
        }
    </style>
</head>
<body>

    <div class="theater-stage">
        <div class="video-wrapper">
            <iframe id="mainPlayer" 
                    src="https://www.youtube.com/embed/cE0lxvVm7AE?rel=0&modestbranding=1" 
                    allowfullscreen>
            </iframe>
        </div>
        <div class="screen-structure"></div>
    </div>

    <a href="index.html" class="exit-link">Return to Hub</a>

</body>
</html>
