<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masqworks Theater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .theater-container {
            position: relative;
            width: 100vw;
            height: 177.77vw; /* Rigid 9:16 ratio */
            max-width: 450px;
            max-height: 800px;
            background-image: url('drive_in_screen.png?v=1'); /* Cache buster added */
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .video-slot {
            position: absolute;
            top: 11.2%;    
            left: 9.5%;    
            width: 81%;    
            height: 18.5%; /* Deep enough to tuck behind the metal dashboard */
            background: #000;
            z-index: 10;
        }

        .video-slot iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-layer {
            position: absolute;
            bottom: 6%;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 20;
        }

        .exit-link {
            padding: 10px 20px;
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid #333;
            color: #555;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="theater-container">
        <div class="video-slot">
            <iframe 
                src="https://www.youtube.com/embed/cE0lxvVm7AE?modestbranding=1&rel=0&v=1" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="btn-layer">
            <a href="index.html" class="exit-link">RETURN TO HUB</a>
        </div>
    </div>

</body>
</html>
