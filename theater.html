<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masqworks Drive-In | Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column; /* Stacks everything vertically */
            align-items: center;
            justify-content: flex-start; /* Starts content at the top */
            overflow: hidden;
            font-family: sans-serif;
        }

        /* 1. The Background Layer: Drive-In Vibe only */
        .theater-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Your NEW background image file goes here */
            background-image: url('drive_in_bg_static.png'); 
            background-size: cover; /* Fills the whole screen, crops if needed */
            background-position: center bottom; /* Keeps the 'ground' and cars in view */
            background-repeat: no-repeat;
            z-index: 1; /* Sits at the bottom */
        }

        /* 2. The Video Container: A perfect, clean container on top */
        .video-player-container {
            position: relative;
            width: 100%;
            max-width: 450px; /* Limits size on desktop */
            aspect-ratio: 9/16; /* Maintains the 'phone' shape */
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Puts the video near the top */
            z-index: 10; /* Sits ON TOP of the background */
            margin-top: 10vh; /* Pushes the video down slightly from the very edge */
        }

        /* The actual video player slot */
        .video-frame {
            position: relative;
            width: 90%; /* Leaves a 5% margin on left/right for a cleaner look */
            aspect-ratio: 16/9; /* The standard video ratio */
            background-color: #000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); /* Adds depth to the screen */
            border: 2px solid #222; /* Clean, dark frame */
            overflow: hidden;
            border-radius: 6px;
        }

        .video-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 3. The Title Overlay */
        .title-overlay {
            position: absolute;
            top: 2vh;
            width: 100%;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        .title-text {
            color: #fafafa;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 4px;
        }

        /* 4. The Exit button */
        .exit-link {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #333;
            color: #71717a;
            text-decoration: none;
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 0.3em;
            border-radius: 4px;
            z-index: 30;
        }
    </style>
</head>
<body>

    <div class="theater-stage"></div>

    <div class="title-overlay">
        <span class="title-text">MASQWORKS DRIVE-IN</span>
    </div>

    <div class="video-player-container">
        <div class="video-frame">
            <iframe 
                src="https://www.youtube.com/embed/cE0lxvVm7AE?modestbranding=1&rel=0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

    <a href="index.html" class="exit-link">RETURN TO HUB</a>

</body>
</html>
