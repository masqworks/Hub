<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masqworks Theater</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Forces a strict 9:16 container that won't warp */
        .theater-viewport {
            position: relative;
            width: 100vw;
            height: 177.77vw; /* Precise 9:16 ratio */
            max-width: 450px;
            max-height: 800px;
            background-image: url('drive_in_screen.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* The Video: Coordinates adjusted for the 'contain' fit */
        .video-layer {
            position: absolute;
            top: 11.2%;    
            left: 9.6%;    
            width: 80.8%;  
            height: 18.4%; /* Slightly deeper to ensure it hits the metal bar */
            background: #000;
            z-index: 5;
        }

        .video-layer iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        .nav-container {
            position: absolute;
            bottom: 8%;
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .exit-btn {
            padding: 10px 20px;
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #333;
            color: #666;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="theater-viewport">
        <div class="video-layer">
            <iframe 
                src="https://www.youtube.com/embed/cE0lxvVm7AE?modestbranding=1&rel=0&iv_load_policy=3" 
                allowfullscreen>
            </iframe>
        </div>

        <div class="nav-container">
            <a href="index.html" class="exit-btn">RETURN TO HUB</a>
        </div>
    </div>

</body>
</html>
