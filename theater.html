<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masqworks Drive-In | Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            overflow: hidden; font-family: sans-serif;
        }

        .theater-stage {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('drive_in_bg_static.png'); 
            background-size: cover; background-position: center bottom;
            background-repeat: no-repeat; z-index: 1;
        }

        /* Desktop Fix */
        @media (min-width: 1024px) {
            .theater-stage {
                background-size: contain;
                background-position: center;
            }
        }

        .video-player-container {
            position: relative; width: 100%; max-width: 450px;
            aspect-ratio: 9/16; display: flex;
            justify-content: center; align-items: flex-start;
            z-index: 10; margin-top: 10vh;
        }

        .video-frame {
            position: relative; width: 90%; aspect-ratio: 16/9;
            background-color: #000; border: 2px solid #222;
            overflow: hidden; border-radius: 6px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        .video-frame iframe { width: 100%; height: 100%; border: none; }

        .exit-link {
            position: absolute; bottom: 5vh; left: 50%;
            transform: translateX(-50%); padding: 12px 24px;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #333;
            color: #71717a; text-decoration: none;
            font-size: 10px; font-weight: 900;
            letter-spacing: 0.3em; border-radius: 4px; z-index: 30;
        }
    </style>
</head>
<body>
    <div class="theater-stage"></div>
    <div class="video-player-container">
        <div class="video-frame">
            <iframe id="movieScreen" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
    <a href="entrance.html" class="exit-link">RETURN TO BOX OFFICE</a>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('vid');
        const screen = document.getElementById('movieScreen');

        if (videoId) {
            screen.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&modestbranding=1&rel=0`;
        } else {
            screen.src = `https://www.youtube.com/embed/cE0lxvVm7AE?autoplay=1&modestbranding=1&rel=0`;
        }
    </script>
</body>
</html>
