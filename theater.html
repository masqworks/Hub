<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masqworks Drive-In | Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #09090b; 
            color: #fafafa;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }
        
        .theater-stage {
            position: relative;
            width: 100%;
            max-width: 450px; 
            aspect-ratio: 9/16; 
            margin: 0 auto;
            background-color: #000;
        }

        /* Matches the 16:9 rectangle in your editor */
        .video-wrapper {
            position: absolute;
            top: 11.2%;    /* Aligned with your new top frame position */
            left: 10%;     
            width: 80%;    
            aspect-ratio: 16/9; 
            z-index: 10;
            overflow: hidden;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* The Graphic Layer with your new frame */
        .screen-structure {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 20;
            background-image: url('drive_in_screen.png'); 
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
        }

        .exit-link {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 10px;
            font-weight: 900;
            color: #71717a;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #27272a;
            padding: 10px 20px;
            border-radius: 6px;
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(4px);
            z-index: 30;
        }

        .exit-link:hover {
            color: #ffffff;
            border-color: #dc2626;
        }
    </style>
</head>
<body>

    <div class="theater-stage">
        <div class="video-wrapper">
            <iframe id="mainPlayer" 
                    src="https://www.youtube.com/embed/cE0lxvVm7AE?rel=0&modestbranding=1" 
                    allowfullscreen>
            </iframe>
        </div>
        <div class="screen-structure"></div>
        <a href="index.html" class="exit-link">Return to Hub</a>
    </div>

</body>
</html>
