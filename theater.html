<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masqworks Drive-In | Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #09090b; 
            color: #fafafa;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        
        .theater-stage {
            position: relative;
            width: 95%;
            max-width: 1100px; 
            aspect-ratio: 16/9;
        }

        /* Ambient Red Glow behind the screen */
        .screen-glow {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            box-shadow: 0 0 100px 40px rgba(220, 38, 38, 0.25); 
            z-index: 10;
            pointer-events: none;
        }

        /* The Video Layer */
        .video-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Your Custom Mask Layer */
        .screen-structure {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 30;
            background-image: url('drive_in_screen.png'); 
            background-size: 100% 100%;
            background-repeat: no-repeat;
        }

        .exit-link {
            margin-top: 50px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 10px;
            font-weight: 900;
            color: #3f3f46;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #27272a;
            padding: 10px 20px;
            border-radius: 4px;
        }

        .exit-link:hover {
            color: #ffffff;
            border-color: #52525b;
            background: #18181b;
        }
    </style>
</head>
<body>

    <div class="theater-stage">
        <div class="screen-glow"></div>
        
        <div class="video-wrapper">
            <iframe id="mainPlayer" src="https://www.youtube.com/embed/YOUR_VIDEO_ID_HERE?rel=0&modestbranding=1" allowfullscreen></iframe>
        </div>
        
        <div class="screen-structure"></div>
    </div>

    <a href="index.html" class="exit-link">Return to Hub</a>

</body>
</html>
