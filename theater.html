<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masqworks Drive-In | Premiere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #09090b; 
            color: #fafafa;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: sans-serif;
        }
        
        .theater-stage {
            position: relative;
            width: 100%;
            max-width: 1100px; 
            aspect-ratio: 16/9;
            margin: 0 auto;
        }

        /* Ambient Red Glow behind the screen */
        .screen-glow {
            position: absolute;
            top: 20%;
            left: 20%;
            width: 60%;
            height: 60%;
            box-shadow: 0 0 120px 50px rgba(220, 38, 38, 0.2); 
            z-index: 5;
            pointer-events: none;
        }

        /* The Video Layer - Adjusted to fit the red frame hole */
        .video-wrapper {
            position: absolute;
            top: 15.5%;    
            left: 14.5%;   
            width: 71%;    
            height: 60%;   
            z-index: 10;
        }

        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Your Custom PNG Layer (On Top) */
        .screen-structure {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            z-index: 20;
            background-image: url('drive_in_screen.png'); 
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }

        .exit-link {
            margin-top: 40px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            font-size: 10px;
            font-weight: 900;
            color: #52525b;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #27272a;
            padding: 12px 24px;
            border-radius: 6px;
            background: rgba(18, 18, 18, 0.5);
            backdrop-filter: blur(4px);
        }

        .exit-link:hover {
            color: #ffffff;
            border-color: #dc2626;
            background: #18181b;
        }
    </style>
</head>
<body>

    <div class="theater-stage">
        <div class="screen-glow"></div>
        
        <div class="video-wrapper">
            <iframe id="mainPlayer" 
                    src="https://www.youtube.com/embed/cE0lxvVm7AE?rel=0&modestbranding=1&autoplay=0" 
                    allow="autoplay; encrypted-media" 
                    allowfullscreen>
            </iframe>
        </div>
        
        <div class="screen-structure"></div>
    </div>

    <a href="index.html" class="exit-link">Return to Hub</a>

</body>
</html>
